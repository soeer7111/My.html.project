<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Video Player</title>
    <style>
        /* Matrix Effect Background */
        body {
            margin: 0;
            padding: 20px;
            background-color: #000; /* အမည်းရောင် နောက်ခံ */
            color: #0f0; /* Matrix အစိမ်းရောင် */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 30px;
        }

        /* Video Container */
        .video-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .video-item {
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #0f0;
            padding: 10px;
            border-radius: 8px;
            width: 300px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
            transition: transform 0.3s;
        }

        .video-item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }

        video {
            width: 100%;
            border-radius: 4px;
            border: 1px solid #0f0;
        }

        .video-title {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Matrix Rain Animation (Optional) */
        @keyframes matrix {
            0% { text-shadow: 0 0 5px #0f0; }
            50% { text-shadow: 0 0 20px #0f0, 0 0 30px #0f0; }
            100% { text-shadow: 0 0 5px #0f0; }
        }
        .matrix-text {
            animation: matrix 2s infinite;
        }
    </style>
</head>
<body>

    <h1 class="matrix-text">မိုနာလီစာ video ကြည့်ပေးပါဦး 😂😂😂😂</h1>

    <div class="video-list">

        <div class="video-item">
            <video controls>
                <source src="media_693171f3d28eb.mp4" type="video/mp4">
            </video>
            <div class="video-title">>မိုနာလီစာ</div>
        </div>

        <div class="video-item">
            <video controls>
                <source src="2.mp4" type="video/mp4">
            </video>
            <div class="video-title">> FILE: 2.mp4</div>
        </div>

        <div class="video-item">
            <video controls>
                <source src="3.mp4" type="video/mp4">
            </video>
            <div class="video-title">> FILE: 3.mp4</div>
        </div>

        </div>

</body>
</html>
