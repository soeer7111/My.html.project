<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player - 1.mp4</title>
    <style>
        /* CSS ပိုင်း - Player ကို လှပသပ်ရပ်အောင် ပြင်ဆင်ခြင်း */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .video-card {
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 90%;
            text-align: center;
        }

        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 22px;
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            line-height: 0; /* extra space ဖယ်ရန် */
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #ddd;
        }

        .status-note {
            margin-top: 15px;
            padding: 10px;
            background: #fff8e1;
            border-left: 5px solid #ffc107;
            font-size: 14px;
            color: #5d4037;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="video-card">
        <h2>My Video Player (1.mp4)</h2>

        <div class="video-wrapper">
            <video controls>
                <source src="media_693171f3d28eb.mp4" type="video/mp4">
                သင့် Browser က ဗီဒီယိုကို Support မလုပ်ပါဘူး။
            </video>
        </div>

        <div class="status-note">
            <strong>သတိပြုရန်-</strong> <br>
            ၁။ ဗီဒီယိုဖိုင်နာမည်သည် <b>1.mp4</b> အတိအကျ ဖြစ်ရပါမည်။ <br>
            ၂။ ဤ HTML ဖိုင်နှင့် 1.mp4 ဖိုင်သည် <b>Folder တစ်ခုတည်း</b> ထဲမှာ ရှိနေရပါမည်။
        </div>
    </div>

</body>
</html>
